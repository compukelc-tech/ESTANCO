<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Inventario y POS | Estanco</title>
  
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f0f11">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@400;500;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="bannerPublicitarioContainer"></div>
<div id="sidebarOverlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>

<div class="main-content no-print" id="mainContent">
  <div class="topbar">
    <div class="brand-wrapper">
      <div class="brand-logo">🥃</div>
      <div>
        <div class="brand-title">Inventario</div>
        <div class="brand-subtitle" id="appSub">Módulo de autenticación</div>
      </div>
    </div>
    <div class="topbar-right">
      <span id="roleBadge" class="role-badge"></span>
      <button id="menuToggleBtn" class="btn-menu" onclick="toggleSidebar()">☰ Tablero</button>
    </div>
  </div>

  <div class="work-nav no-print" id="workNav">
    <button class="btn btn-ghost" id="btnTabDash" onclick="cambiarSeccionTrabajo('DASHBOARD')">🏠 Panel</button>
    <button class="btn btn-primary" id="btnTabAlta" onclick="cambiarSeccionTrabajo('ALTA')" style="display:none;">➕ Nuevo Artículo</button>
    <button class="btn btn-success" id="btnTabReabastecer" onclick="abrirModalReabastecer()" style="display:none;">🔄 Reabastecer</button>
    <button class="btn btn-blue" id="btnTabPOS" onclick="cambiarSeccionTrabajo('POS')">🛒 Punto de Venta</button>
    <button class="btn btn-purple" id="btnTabRep" onclick="cambiarSeccionTrabajo('REPORTES')" style="display:none;">📊 Reportes</button>
    <button class="btn btn-danger" id="btnTabCartera" onclick="cambiarSeccionTrabajo('CARTERA')" style="display:none;">💼 Cartera</button>
  </div>

  <div class="scrollable-body">
    <div id="lockScreen" class="lock-screen" style="display: flex;">
      <div class="welcome-banner" style="text-align:center;">
        <h1 style="margin-bottom:10px;">Sistema de Gestión Estanco</h1>
        <p style="margin:0 auto;">Plataforma integral de inventario y facturación. Identifícate para acceder.</p>
      </div>
    </div>

    <div id="areaDashboard" style="display:none;">...</div>
    <div id="areaProducto" style="display:none;">...</div>
    <div id="areaPOS" style="display:none;">...</div>
    <div id="areaReportes" style="display:none;">...</div>
    <div id="areaCartera" style="display:none;">...</div>
  </div>
</div>

<div class="sidebar-panel no-print" id="sidebarPanel">
  <div class="sidebar-header"><h2>🔐 Identificación</h2><button class="close-btn" onclick="toggleSidebar()">✕</button></div>
  <div class="sidebar-scroll">
    <div id="sessionInfo" class="session-card">
      <div id="siName">—</div>
      <div id="siRole">—</div>
      <button class="btn btn-danger btn-w100" onclick="cerrarSesion()">🚪 Cerrar Sesión</button>
    </div>
    <div id="loginForm" class="auth-box">...</div>
    <div id="registerForm" class="auth-box" style="display:none;">...</div>
    <div id="forgotPasswordForm" class="auth-box" style="display:none;">...</div>
    <div id="changePasswordForm" class="auth-box" style="display:none;">...</div>
    <div class="feedback-msg" id="pmsg"></div>
  </div>
</div>

<div id="modalInfoProducto" class="modal-overlay" style="display:none;">...</div>
<div id="modalListaFiadores" class="modal-overlay" style="display:none;">...</div>
<div id="modalNuevoDeudor" class="modal-overlay" style="display:none;">...</div>
<div id="modalReabastecer" class="modal-overlay" style="display:none;">...</div>
<div id="modalImpresion" class="modal-overlay" style="display:none;">...</div>
<div id="area-impresion" class="print-area" style="display:none;"></div>

<script src="app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(console.error);
    });
  }
</script>
</body>
</html>
